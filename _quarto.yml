project:
  type: website
  output-dir: docs

website:
  title: "Skill Acquisition Research Group"
  site-url: https://lsumotorlab.github.io/lsu_lab_webpage
  navbar:
    background: light
    title: "Skill Acquisition Research Group"
    search: false
    left:
      - text: "Team"
        href: team.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Gallery"
        href: gallery.qmd
      - text: "Contact"
        href: contact.qmd
      - text: "Join Us"
        href: join.qmd
  page-footer:
    center: |
      <a href="/"><img src="/images/lab_logo_1.png" style="height: 100px; display: block; margin: 0 auto 0.5rem; opacity: 0.9;" alt="Skill Acquisition Research Group"></a>
      © 2026 LSU Skill Acquisition Lab. All rights reserved.
    
format:
  html:
    theme:
      light: [cosmo, custom.scss]
    css: styles.css
    toc: false
    page-layout: full
    lang: en
    include-after-body: a11y-fixes.html
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
