<script>
(function () {
  // Insert skip link as the very first element in <body>, before the navbar
  var skipLink = document.createElement('a');
  skipLink.href = '#quarto-document-content';
  skipLink.className = 'skip-link';
  var pageLang = document.documentElement.lang || 'en';
  skipLink.textContent = pageLang.startsWith('lt') ? 'Pereiti prie pagrindinio turinio' : 'Skip to main content';
  document.body.insertBefore(skipLink, document.body.firstChild);

  // Remove incorrect role="menu" from the mobile navbar toggler button
  var toggler = document.querySelector('button.navbar-toggler[role="menu"]');
  if (toggler) toggler.removeAttribute('role');
})();
</script>
